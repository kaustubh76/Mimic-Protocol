# Foundry Configuration for Mirror Protocol
# https://book.getfoundry.sh/reference/config/

[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache_foundry"

# Solidity compiler settings
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false

# Testing
fuzz_runs = 256
fuzz_max_test_rejects = 65536

# Formatting
line_length = 100
tab_width = 4
bracket_spacing = true

# Gas reporting
gas_reports = ["*"]

# RPC endpoints
[rpc_endpoints]
monad = "${MONAD_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
localhost = "http://127.0.0.1:8545"

# Etherscan (for verification)
[etherscan]
monad = { key = "${MONAD_EXPLORER_API_KEY}", url = "https://explorer.testnet.monad.xyz/api" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
