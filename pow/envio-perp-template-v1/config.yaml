# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
#
# envio-perp-template-v1
# Perp-protocol indexer scaffold targeting GMX v2's REAL EventEmitter
# pattern on Arbitrum.
#
# Architecture choice — and why this template differs from the DEX template:
#
# GMX v2 uses a single global `EventEmitter` contract that emits generic
# `EventLog1` / `EventLog2` events with bytes-encoded `EventLogData`
# payloads + a string `eventName` field for routing. NOT a factory +
# per-market events pattern. So:
#   - One contract entry below (EventEmitter), not factory + dynamic
#   - Handler routes on `event.params.eventName` rather than per-event
#   - `EventLogData` is a nested struct of typed dictionaries (Address,
#     Uint, Int, Bool, Bytes32, Bytes, String items) — Envio's codegen
#     produces typed accessors but the data is sparse and keyed by string.
#
# v1 scope: handle ONE event type (`PositionIncrease`) end-to-end as
# proof the architecture works against real GMX v2 data. PositionDecrease,
# Liquidation, FundingFeeAmountPerSizeUpdated, plus the dozens of other
# events GMX emits, are mechanical follow-ups documented in README.md.

name: envio-perp-template-v1
description: GMX-v2-shaped perp indexer — EventEmitter on Arbitrum (PositionIncrease v1)
rollback_on_reorg: true
raw_events: false

field_selection:
  transaction_fields:
    - "hash"

contracts:
  # Single global EventEmitter on Arbitrum. Address from
  # gmx-io/gmx-synthetics/deployments/arbitrum/EventEmitter.json.
  # Handler routes on `eventName` to choose which path to take.
  - name: EventEmitter
    abi_file_path: abis/EventEmitter.json
    handler: src/EventHandlers/EventEmitter.ts
    events:
      - event: EventLog1
      # EventLog and EventLog2 also exist on the contract; v1 only handles
      # EventLog1 (which is what PositionIncrease is emitted as). Adding
      # the others is mechanical.

networks:
  - id: 42161
    start_block: 107737756  # GMX v2 EventEmitter deployment block on Arbitrum
    contracts:
      - name: EventEmitter
        address:
          - 0xC8ee91A54287DB53897056e12D9819156D3822Fb
