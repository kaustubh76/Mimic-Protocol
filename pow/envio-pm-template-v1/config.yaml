# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
#
# envio-pm-template-v1
# Production-grade prediction-markets indexer scaffold. Five PM event shapes
# baked in: market creation, position taking, market locking, oracle
# resolution, correction handling, payout claiming.
#
# This template uses a generic prediction-market ABI shape that maps to the
# event semantics common across:
#   - Polymarket (Polygon, ConditionalTokens + UMA optimistic oracle)
#   - Limitless (Base, daily markets)
#   - Augur, SX Bet, and similar
#
# The four-state settlement machine is implemented in
# src/EventHandlers/Settlement.ts and is the canonical artifact this template
# anchors. See ENVIO_SETTLEMENT_HANDLER_REFERENCE.md.

name: envio-pm-template-v1
description: Production-grade prediction-markets indexer template — four-state settlement handler, leaderboard architecture, market-type taxonomy
rollback_on_reorg: true
raw_events: false

field_selection:
  transaction_fields:
    - "hash"

contracts:
  # MarketFactory emits MarketCreated, which dynamically registers each new
  # market via context.addMarket(). This is the same factory pattern used
  # by the DeFi template's PoolFactory.
  - name: MarketFactory
    abi_file_path: abis/MarketFactory.json
    handler: src/EventHandlers/MarketFactory.ts
    events:
      - event: MarketCreated

  # Market is registered DYNAMICALLY at runtime. Each market is its own
  # contract instance; new markets ship continuously.
  - name: Market
    abi_file_path: abis/Market.json
    handler: src/EventHandlers/Market.ts
    events:
      - event: PositionTaken
      - event: PositionClosed
      - event: MarketLockedForResolution
      - event: OracleResolved
      - event: MarketCorrected
      - event: PayoutClaimed

networks:
  # Polygon mainnet — Polymarket's home chain (4B events on this network).
  # The factory address below is a placeholder for the user's deployed
  # MarketFactory; replace with your own protocol's address.
  - id: 137
    start_block: 50000000
    contracts:
      - name: MarketFactory
        address:
          - 0x0000000000000000000000000000000000000000  # PLACEHOLDER — replace with your protocol's MarketFactory
      - name: Market
        address: []  # Registered dynamically via context.addMarket()

  # Base mainnet — Limitless's home chain.
  - id: 8453
    start_block: 8000000
    contracts:
      - name: MarketFactory
        address:
          - 0x0000000000000000000000000000000000000000  # PLACEHOLDER — replace with your protocol's MarketFactory
      - name: Market
        address: []
