name: CI

on:
  push:
    branches: [main, vertical-playbook-artifacts]
  pull_request:
    branches: [main, vertical-playbook-artifacts]
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------
  # DeFi indexer template: install + codegen + tsc + vitest.
  # -------------------------------------------------------------------
  defi-template:
    name: pow/envio-defi-template-v1
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pow/envio-defi-template-v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: pnpm install
        run: pnpm install --frozen-lockfile=false

      - name: pnpm codegen (envio)
        run: pnpm codegen

      - name: tsc --noEmit
        run: npx tsc --noEmit

      - name: pnpm test (vitest)
        run: pnpm test

  # -------------------------------------------------------------------
  # Money-market indexer template: install + codegen + tsc + vitest.
  # Aave-V3-shaped events; replaces the prior PM template (Envio ships
  # the PM vertical via enviodev/polymarket-v2-indexer).
  # -------------------------------------------------------------------
  money-market-template:
    name: pow/envio-money-market-template-v1
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pow/envio-money-market-template-v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: pnpm install
        run: pnpm install --frozen-lockfile=false

      - name: pnpm codegen (envio)
        run: pnpm codegen

      - name: tsc --noEmit
        run: npx tsc --noEmit

      - name: pnpm test (vitest)
        run: pnpm test

  # -------------------------------------------------------------------
  # Perp indexer template: install + codegen + tsc + vitest.
  # -------------------------------------------------------------------
  perp-template:
    name: pow/envio-perp-template-v1
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pow/envio-perp-template-v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: pnpm install
        run: pnpm install --frozen-lockfile=false

      - name: pnpm codegen (envio)
        run: pnpm codegen

      - name: tsc --noEmit
        run: npx tsc --noEmit

      - name: pnpm test (vitest)
        run: pnpm test
