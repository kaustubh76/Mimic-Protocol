name: mirror-protocol-indexer
description: Real-time behavioral pattern indexing for Mirror Protocol

networks:
  - id: 10143
    start_block: 19213700
    hypersync_config:
      url: https://monad-testnet.hypersync.xyz
    contracts:
      - name: BehavioralNFT
        address:
          - "0x6943e7D39F3799d0b8fa9D6aD6B63861a15a8d26"
        handler: EventHandlers.ts
        events:
          - event: "PatternMinted(uint256 indexed tokenId, address indexed creator, string patternType, bytes patternData, uint256 timestamp)"
          - event: "PatternPerformanceUpdated(uint256 indexed tokenId, uint256 winRate, uint256 totalVolume, int256 roi)"
          - event: "PatternDeactivated(uint256 indexed tokenId, string reason)"
          - event: "Transfer(address indexed from, address indexed to, uint256 indexed tokenId)"
      - name: DelegationRouter
        address:
          - "0xd5499e0d781b123724dF253776Aa1EB09780AfBf"
        handler: EventHandlers.ts
        events:
          - event: "DelegationCreated(uint256 indexed delegationId, address indexed delegator, uint256 indexed patternTokenId, uint256 percentageAllocation, address smartAccountAddress, uint256 timestamp)"
          - event: "DelegationRevoked(uint256 indexed delegationId, address indexed delegator, uint256 indexed patternTokenId, uint256 timestamp)"
          - event: "DelegationUpdated(uint256 indexed delegationId, uint256 percentageAllocation, uint256 timestamp)"
          - event: "TradeExecuted(uint256 indexed delegationId, uint256 indexed patternTokenId, address indexed executor, address token, uint256 amount, bool success, uint256 timestamp)"

rollback_on_reorg: true

field_selection:
  transaction_fields:
    - "hash"
