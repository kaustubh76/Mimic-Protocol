#
# Mirror Protocol - Envio Working Configuration
# @description Simplified RPC-based indexer for Monad Testnet
# @author Mirror Protocol Team
#
# PERFORMANCE TARGETS:
# - RPC polling every 5 seconds
# - 100 blocks per request
# - Sub-second event processing
#

name: mirror-protocol-indexer
description: Real-time behavioral pattern indexing for Mirror Protocol

# Networks to index
networks:
  - id: 10143  # Monad Testnet
    start_block: 42700000  # Recent block (adjust to current block - 10000)
    rpc_config:
      url: https://testnet-rpc.monad.xyz

    contracts:
      # BehavioralNFT - Core pattern NFT contract
      - name: BehavioralNFT
        address:
          - "0x3ceBC8049BdAC66BfbAECC94Cce756122ed25DAc"
        handler: src/EventHandlers.ts
        events:
          # Essential events only for initial sync
          - event: "PatternMinted(uint256 indexed tokenId, address indexed creator, string patternType, bytes patternData, uint256 timestamp)"
            required_entities:
              - name: Pattern
              - name: Creator
              - name: SystemMetrics

          - event: "PatternPerformanceUpdated(uint256 indexed tokenId, uint256 winRate, uint256 totalVolume, int256 roi)"
            required_entities:
              - name: Pattern
              - name: PerformanceUpdate

          - event: "Transfer(address indexed from, address indexed to, uint256 indexed tokenId)"
            required_entities:
              - name: Pattern

# Rollback on reorg for data consistency
rollback_on_reorg: true

# Field selection (optimize queries)
field_selection:
  transaction_fields:
    - "hash"
    - "transactionIndex"
    - "from"
    - "to"
    - "value"
  block_fields:
    - "number"
    - "timestamp"
    - "hash"
