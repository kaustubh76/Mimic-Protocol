#
# Mirror Protocol - GraphQL Schema
# @description Entity definitions for behavioral pattern indexing
# @author Mirror Protocol Team
#
# PERFORMANCE NOTES:
# - All queries optimized for <50ms response time
# - Indexed fields marked with @index for fast lookups
# - Derived fields for efficient relationships
#

"""
Pattern entity representing a minted behavioral NFT
Stores complete pattern metadata and performance metrics
"""
type Pattern @entity {
  "Unique identifier - matches NFT tokenId"
  id: ID!

  "NFT token ID on BehavioralNFT contract"
  tokenId: BigInt! @index

  "Pattern creator (wallet address)"
  creator: Creator!

  "Current owner of the pattern NFT"
  owner: Bytes! @index

  "Pattern classification (momentum, arbitrage, mean_reversion, etc.)"
  patternType: String! @index

  "Encoded pattern parameters (ABI-encoded bytes)"
  patternData: String!

  "Decoded pattern parameters (JSON string for easier querying)"
  patternDataDecoded: String

  "Pattern creation timestamp"
  createdAt: BigInt! @index

  "Block number when pattern was minted"
  createdAtBlock: BigInt!

  "Transaction hash of mint transaction"
  mintTxHash: Bytes!

  # Performance Metrics
  "Win rate in basis points (10000 = 100%)"
  winRate: BigInt!

  "Total volume traded using this pattern"
  totalVolume: BigInt!

  "Return on investment in basis points (can be negative)"
  roi: BigInt!

  "Pattern performance trend (improving/declining/stable)"
  trendDirection: String!

  "Quality grade based on combined metrics (A+/A/B/C/D/F)"
  qualityGrade: String!

  "Consecutive positive performance updates"
  consecutiveImprovements: Int!

  "Consecutive negative performance updates"
  consecutiveDeclines: Int!

  "Pattern activity status"
  isActive: Boolean! @index

  "Reason for deactivation (if applicable)"
  deactivationReason: String

  "Timestamp of last deactivation"
  deactivatedAt: BigInt

  # Derived metrics (computed in handlers)
  "Number of times pattern has been delegated to"
  delegationCount: Int!

  "Total earnings generated by pattern delegations"
  totalEarnings: BigInt!

  "Number of successful executions"
  successfulExecutions: Int!

  "Number of failed executions"
  failedExecutions: Int!

  "Last performance update timestamp"
  lastUpdatedAt: BigInt!

  # Performance ranking (computed)
  "Global rank by win rate"
  winRateRank: Int

  "Global rank by ROI"
  roiRank: Int

  "Global rank by volume"
  volumeRank: Int

  # Relationships
  "Performance updates history"
  performanceUpdates: [PerformanceUpdate!]! @derivedFrom(field: "pattern")

  "Delegation history for this pattern"
  delegations: [Delegation!]! @derivedFrom(field: "pattern")

  "Execution history"
  executions: [Execution!]! @derivedFrom(field: "pattern")
}

"""
Creator entity representing pattern creators
Aggregates all patterns created by a wallet address
"""
type Creator @entity {
  "Wallet address (lowercase)"
  id: ID!

  "Wallet address (original case)"
  address: Bytes! @index

  "All patterns created by this creator"
  patterns: [Pattern!]! @derivedFrom(field: "creator")

  "Total number of patterns created"
  totalPatterns: Int!

  "Number of currently active patterns"
  activePatterns: Int!

  "Number of deactivated patterns"
  deactivatedPatterns: Int!

  "Total volume across all patterns"
  totalVolume: BigInt!

  "Average win rate across active patterns"
  averageWinRate: BigInt!

  "Average ROI across active patterns"
  averageROI: BigInt!

  "Total earnings from all patterns"
  totalEarnings: BigInt!

  "Creator reputation score (0-10000)"
  reputationScore: Int!

  "First pattern creation timestamp"
  firstPatternAt: BigInt!

  "Last pattern creation timestamp"
  lastPatternAt: BigInt!

  "Creator rank by total patterns"
  creatorRank: Int
}

"""
Performance update event tracking
Stores historical performance data for time-series analysis
"""
type PerformanceUpdate @entity {
  "Unique ID: {patternId}-{timestamp}"
  id: ID!

  "Pattern being updated"
  pattern: Pattern!

  "Win rate at time of update"
  winRate: BigInt!

  "Total volume at time of update"
  totalVolume: BigInt!

  "ROI at time of update"
  roi: BigInt!

  "Update timestamp"
  timestamp: BigInt! @index

  "Block number"
  blockNumber: BigInt!

  "Transaction hash"
  txHash: Bytes!

  # Computed deltas (change from previous update)
  "Change in win rate"
  winRateDelta: BigInt

  "Change in volume"
  volumeDelta: BigInt

  "Change in ROI"
  roiDelta: BigInt
}

"""
System metrics for dashboard display
Singleton entity tracking global statistics
"""
type SystemMetrics @entity {
  "Always '1' - singleton entity"
  id: ID!

  # Pattern statistics
  "Total patterns minted"
  totalPatterns: Int!

  "Currently active patterns"
  activePatterns: Int!

  "Patterns minted in last 24 hours"
  last24hPatterns: Int!

  "Patterns minted in last 7 days"
  last7dPatterns: Int!

  # Creator statistics
  "Total unique creators"
  totalCreators: Int!

  "Active creators (created pattern in last 30 days)"
  activeCreators: Int!

  # Performance statistics
  "Average win rate across all active patterns"
  averageWinRate: BigInt!

  "Median win rate"
  medianWinRate: BigInt!

  "Total volume across all patterns"
  totalVolume: BigInt!

  "Total earnings from delegations"
  totalEarnings: BigInt!

  # Delegation statistics
  "Total delegations created"
  totalDelegations: Int!

  "Currently active delegations"
  activeDelegations: Int!

  "Total unique delegators"
  totalDelegators: Int!

  # Execution statistics
  "Total trade executions"
  totalExecutions: Int!

  "Successful trade executions"
  successfulExecutions: Int!

  "Failed trade executions"
  failedExecutions: Int!

  # Event processing metrics
  "Total events processed"
  eventsProcessed: BigInt!

  "Events processed in last hour"
  eventsLastHour: Int!

  "Average event processing time (ms)"
  averageProcessingTime: Int!

  # HyperSync performance metrics
  "Average query latency (ms)"
  averageQueryLatency: Int!

  "Peak events per second"
  peakEventsPerSecond: Int!

  "Current events per second"
  currentEventsPerSecond: Int!

  # Pattern type distribution
  "Count of momentum patterns"
  momentumPatterns: Int!

  "Count of arbitrage patterns"
  arbitragePatterns: Int!

  "Count of mean reversion patterns"
  meanReversionPatterns: Int!

  "Count of other pattern types"
  otherPatterns: Int!

  # Latest activity
  "Timestamp of last pattern minted"
  lastPatternMintedAt: BigInt!

  "Timestamp of last performance update"
  lastPerformanceUpdateAt: BigInt!

  "Last updated timestamp"
  lastUpdatedAt: BigInt!
}

"""
Delegation entity tracking pattern delegations via MetaMask Smart Accounts
"""
type Delegation @entity {
  "Unique delegation ID"
  id: ID!

  "On-chain delegation ID"
  delegationId: BigInt! @index

  "Delegator address"
  delegator: Bytes! @index

  "Pattern being delegated to"
  pattern: Pattern!

  "Pattern token ID"
  patternTokenId: BigInt! @index

  "Percentage allocation in basis points (10000 = 100%)"
  percentageAllocation: BigInt!

  "Smart account address for execution"
  smartAccountAddress: Bytes!

  "Delegation creation timestamp"
  createdAt: BigInt! @index

  "Block number when delegation was created"
  createdAtBlock: BigInt!

  "Transaction hash of delegation creation"
  createdTxHash: Bytes!

  "Is delegation currently active"
  isActive: Boolean! @index

  "Timestamp when delegation was revoked"
  revokedAt: BigInt

  "Transaction hash of revocation"
  revokedTxHash: Bytes

  "Last update timestamp"
  lastUpdatedAt: BigInt!

  "Total number of trade executions"
  totalExecutions: Int!

  "Number of successful executions"
  successfulExecutions: Int!

  "Number of failed executions"
  failedExecutions: Int!

  "Total amount traded via this delegation"
  totalAmountTraded: BigInt!

  "Total earnings generated"
  totalEarnings: BigInt!

  "Last execution timestamp"
  lastExecutionAt: BigInt

  "Win rate of executions (basis points)"
  winRate: Int!

  "Average execution time (ms)"
  avgExecutionTime: Int!

  "Success rate (basis points)"
  successRate: Int!
}

"""
Delegator entity tracking delegation activity per wallet
"""
type Delegator @entity {
  "Wallet address (lowercase)"
  id: ID!

  "Wallet address (original case)"
  address: Bytes! @index

  "Total delegations created"
  totalDelegations: Int!

  "Currently active delegations"
  activeDelegations: Int!

  "Revoked delegations"
  revokedDelegations: Int!

  "Number of unique patterns followed"
  totalPatternsFollowed: Int!

  "Total capital delegated"
  totalCapitalDelegated: BigInt!

  "Total earnings from delegations"
  totalEarnings: BigInt!

  "Total trade executions"
  totalExecutions: Int!

  "Successful executions"
  successfulExecutions: Int!

  "Failed executions"
  failedExecutions: Int!

  "Average allocation percentage"
  averageAllocation: Int!

  "First delegation timestamp"
  firstDelegationAt: BigInt!

  "Last delegation timestamp"
  lastDelegationAt: BigInt!

  "Is delegator currently active"
  isActive: Boolean! @index

  "Reputation score (0-10000)"
  reputationScore: Int!
}

"""
Execution entity (placeholder for future ExecutionEngine integration)
Tracks automated pattern executions
"""
type Execution @entity {
  "Unique execution ID"
  id: ID!

  "Pattern being executed"
  pattern: Pattern!

  "Execution timestamp"
  timestamp: BigInt! @index

  "Execution success status"
  success: Boolean! @index

  "Transaction hash"
  txHash: Bytes!

  "Gas used"
  gasUsed: BigInt!

  "Profit/loss from execution"
  profitLoss: BigInt!

  "Error message (if failed)"
  error: String
}

"""
TradeExecution entity tracking individual trade executions
"""
type TradeExecution @entity {
  "Unique execution ID: {delegationId}-{timestamp}-{blockNumber}"
  id: ID!

  "Delegation this execution belongs to"
  delegation: Delegation!

  "On-chain delegation ID"
  delegationId: BigInt! @index

  "Pattern being executed"
  pattern: Pattern!

  "Pattern token ID"
  patternTokenId: BigInt! @index

  "Executor address"
  executor: Bytes! @index

  "Token traded"
  token: Bytes!

  "Trade amount"
  amount: BigInt!

  "Whether execution succeeded"
  success: Boolean! @index

  "Execution timestamp"
  timestamp: BigInt! @index

  "Block number"
  blockNumber: BigInt!

  "Transaction hash"
  txHash: Bytes!
}

"""
PoolSwap entity mirroring UniswapV2Adapter.Swap events.
Joined client-side with TradeExecution by txHash so the LiveExecutionFeed
can display real amountIn / amountOut / tokenIn / tokenOut / pool detail
for every trade, instead of only the bookkeeping amount on TradeExecution.
"""
type PoolSwap @entity {
  "Unique swap ID: {txHash}-{logIndex}"
  id: ID!

  "Address that initiated the swap (the ExecutionEngine during normal flow)"
  sender: Bytes! @index

  "Token spent by the adapter"
  tokenIn: Bytes!

  "Token received by the adapter"
  tokenOut: Bytes!

  "Exact input amount in tokenIn's smallest unit"
  amountIn: BigInt!

  "Realized output amount returned by the Uniswap V2 router"
  amountOut: BigInt!

  "Recipient of the output tokens"
  to: Bytes!

  "Adapter contract that emitted the Swap event"
  adapter: Bytes!

  "Transaction hash — join key for TradeExecution"
  txHash: Bytes! @index

  "Block number"
  blockNumber: BigInt!

  "Block timestamp"
  timestamp: BigInt! @index
}

"""
Event entity for raw event storage
Useful for debugging and analytics
"""
type Event @entity {
  "Unique event ID: {txHash}-{logIndex}"
  id: ID!

  "Event name"
  name: String! @index

  "Block number"
  blockNumber: BigInt! @index

  "Block timestamp"
  timestamp: BigInt! @index

  "Transaction hash"
  txHash: Bytes! @index

  "Log index"
  logIndex: Int!

  "Contract address"
  contractAddress: Bytes!

  "Event parameters (JSON string)"
  params: String!
}
